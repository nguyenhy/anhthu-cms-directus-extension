name: Build and Push Artifact
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.3'

      - name: Setup Pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      # Get pnpm store directory path dynamically
      - name: Get Pnpm Store Directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      # Setup Once and Forget Cache Action
      - name: Setup Pnpm Cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          # Fallback to package.json files if lockfile is missing
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install and Build Extensions
        run: |
          cd extensions/frontstore_bundle
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Consolidate and Push All Framework Artifacts
        run: |
          mkdir -p ../deploy_workspace
          cd ../deploy_workspace
          
          mkdir -p frontstore_bundle/dist
          cp -r $GITHUB_WORKSPACE/extensions/frontstore_bundle/dist/*       frontstore_bundle/dist/
          cp -r $GITHUB_WORKSPACE/extensions/frontstore_bundle/package.json frontstore_bundle/
          
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "Build artifacts from commit ${{ github.sha }}"
          
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin HEAD:dist-deploy