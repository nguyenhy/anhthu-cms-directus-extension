name: Build and Push Artifact
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'

      - name: Setup Pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install and Build Extensions
        run: |
          cd extensions/frontstore_bundle
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Push Build to Isolated Branch
        run: |
          cd extensions/frontstore_bundle/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Build artifact from commit ${{ github.sha }}"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin HEAD:dist-deploy