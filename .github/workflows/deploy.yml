name: Remote Deploy on Merge
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Script over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_IP }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          ssh-agent: true
          script: |
            # Read repo script directly and pipe text straight into target bash
            cat << 'ENGINE_EOF' | bash
            $(cat .github/scripts/deploy.sh)
            ENGINE_EOF
